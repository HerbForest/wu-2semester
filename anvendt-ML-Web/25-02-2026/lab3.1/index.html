<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs/dist/tf.min.js"></script>
<script>
    //opgave 1 1d tensor
    let oneD = tf.tensor1d([1, 2, 3]);
    let oneD2 = tf.tensor1d([1, 2, 3]);

    let twoD = tf.tensor2d([
        [1, 2, 3],
        [4, 5, 6],
    ]);

    const ys = oneD.mul(tf.scalar(5));
    const add = twoD.add(tf.scalar(10));
    ys.print();
    add.print();
    twoD.add(oneD).print();
    tf.add(oneD, oneD2).print();

    //opgave 2
    function getYs(xs, m, c) {
        // To implement
        //
        return xs.mul(m).add(c);
    }
    const t1 = tf.tensor1d([1, 5, 10]);
    const t2 = getYs(t1, 2, 1);
    t2.print();

    //opgave 3
    const t3 = tf.tensor1d([25, 76, 4, 23, -5, 22]);
    const max = t3.max(); // 76
    const min = t3.min(); // -5
    const normalized = t3.sub(min).div(max.sub(min));
    normalized.print();

    //opgave 4
    tf.dispose(() => {
        for (let i = 0; i < 100; i++) {
            tf.tensor1d([1, 2, 3]);
        }
    });
    tf.tidy(() => {
        for (let i = 0; i < 100; i++) {
            tf.tensor1d([4, 5, 6]);
        }
    });
    console.log(tf.memory());
</script>
